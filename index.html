<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>МУИС - Монгол Улсын Их Сургууль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">МУИС</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto" id="navLinks">
      </ul>
    </div>
  </div>
</nav>

<header class="hero text-white text-center py-5">
  <div class="container">
    <h1 class="display-4 fw-bold">Монгол Улсын Их Сургууль</h1>
    <p class="lead">National University of Mongolia</p>
  </div>
</header>

<section id="intro" class="py-5">
  <div class="container">
    <h2 class="mb-4">Танилцуулга</h2>
    <div id="introList" class="row g-4">
      <p class="text-muted">Ачааллаж байна...</p>
    </div>
  </div>
</section>

<section id="teachers" class="py-5 bg-light">
  <div class="container">
    <h2 class="mb-4">Багш нар</h2>
    <div id="teacherList" class="row g-4">
      <p class="text-muted">Ачааллаж байна...</p>
    </div>
  </div>
</section>

<section id="programs" class="py-5">
  <div class="container">
    <h2 class="mb-4">Хөтөлбөрүүд</h2>
    <div id="programList" class="row g-4">
      <p class="text-muted">Ачааллаж байна...</p>
    </div>
  </div>
</section>

<footer class="bg-dark text-white text-center py-3">
  <p class="mb-0">&copy; 2024 Монгол Улсын Их Сургууль</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = "https://num-web.onrender.com";

// ── MENU ──
fetch(API + "/api/menu")
  .then(r => r.json())
  .then(data => {
    const nav = document.getElementById("navLinks");
    nav.innerHTML = data.map(m => `
      <li class="nav-item">
        <a class="nav-link" href="${m.link}">${m.label}</a>
      </li>`).join("");
    nav.innerHTML += `<li class="nav-item">
      <a class="nav-link" href="admin.html">Админ</a>
    </li>`;
  });

// ── INTRO ──
fetch(API + "/api/introduction")
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById("introList");
    if (!data.length) {
      el.innerHTML = "<p class='text-muted'>Мэдээлэл байхгүй</p>";
      return;
    }
    el.innerHTML = data.map(i => `
      <div class="col-md-6">
        <div class="card h-100">
          ${i.image_url ? `<img src="${i.image_url}" class="card-img-top" style="height:200px;object-fit:cover;" onerror="this.style.display='none'"/>` : ""}
          <div class="card-body">
            <h5 class="card-title">${i.title}</h5>
            <p class="card-text">${i.content}</p>
          </div>
        </div>
      </div>`).join("");
  });

// ── TEACHERS ──
fetch(API + "/api/teachers")
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById("teacherList");
    if (!data.length) {
      el.innerHTML = "<p class='text-muted'>Мэдээлэл байхгүй</p>";
      return;
    }
    el.innerHTML = data.map(t => `
      <div class="col-md-4">
        <div class="card h-100 text-center">
          ${t.image_url ? `<img src="${t.image_url}" class="card-img-top" style="height:200px;object-fit:cover;" onerror="this.style.display='none'"/>` : ""}
          <div class="card-body">
            <h5 class="card-title">${t.name}</h5>
            <p class="text-muted mb-1">${t.title}</p>
            <p class="mb-1">${t.department}</p>
            <small>${t.email}</small>
          </div>
        </div>
      </div>`).join("");
  });

// ── PROGRAMS ──
fetch(API + "/api/programs")
  .then(r => r.json())
  .then(data => {
    const el = document.getElementById("programList");
    if (!data.length) {
      el.innerHTML = "<p class='text-muted'>Мэдээлэл байхгүй</p>";
      return;
    }
    el.innerHTML = data.map(p => `
      <div class="col-md-6">
        <div class="card h-100">
          ${p.image_url ? `<img src="${p.image_url}" class="card-img-top" style="height:200px;object-fit:cover;" onerror="this.style.display='none'"/>` : ""}
          <div class="card-body">
            <h5 class="card-title">${p.name}</h5>
            <span class="badge bg-primary me-1">${p.degree}</span>
            <span class="badge bg-secondary">${p.duration}</span>
            <p class="mt-2">${p.description}</p>
          </div>
        </div>
      </div>`).join("");
  });
</script>
</body>
</html>
