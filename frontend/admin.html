<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Админ - МУИС</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="d-flex align-items-center justify-content-center vh-100 bg-light">
  <div class="card p-4" style="width:360px">
    <h4 class="text-center mb-4">Админ нэвтрэх</h4>
    <div id="loginError" class="alert alert-danger d-none"></div>
    <input type="text" id="username" class="form-control mb-3" placeholder="Нэвтрэх нэр"/>
    <input type="password" id="password" class="form-control mb-3" placeholder="Нууц үг"/>
    <button class="btn btn-primary w-100" onclick="doLogin()">Нэвтрэх</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPage" class="d-none">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">МУИС Админ</span>
    <div>
      <a href="index.html" class="btn btn-outline-light btn-sm me-2">Сайт харах</a>
      <button class="btn btn-danger btn-sm" onclick="doLogout()">Гарах</button>
    </div>
  </div>
</nav>

<div class="container py-4">

  <!-- TABS -->
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item"><a class="nav-link active" href="#" onclick="showTab(event,'intro')">Танилцуулга</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="showTab(event,'teachers')">Багш нар</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="showTab(event,'programs')">Хөтөлбөрүүд</a></li>
    <li class="nav-item"><a class="nav-link" href="#" onclick="showTab(event,'menu')">Цэс</a></li>
  </ul>

  <!-- INTRO TAB -->
  <div id="tab-intro">
    <button class="btn btn-success mb-3" onclick="openModal('intro')">+ Нэмэх</button>
    <table class="table table-bordered table-hover">
      <thead class="table-dark"><tr><th>#</th><th>Гарчиг</th><th>Агуулга</th><th>Зураг</th><th>Үйлдэл</th></tr></thead>
      <tbody id="introTable"></tbody>
    </table>
  </div>

  <!-- TEACHERS TAB -->
  <div id="tab-teachers" class="d-none">
    <button class="btn btn-success mb-3" onclick="openModal('teachers')">+ Нэмэх</button>
    <table class="table table-bordered table-hover">
      <thead class="table-dark"><tr><th>#</th><th>Нэр</th><th>Цол</th><th>Тэнхим</th><th>Зураг</th><th>Үйлдэл</th></tr></thead>
      <tbody id="teachersTable"></tbody>
    </table>
  </div>

  <!-- PROGRAMS TAB -->
  <div id="tab-programs" class="d-none">
    <button class="btn btn-success mb-3" onclick="openModal('programs')">+ Нэмэх</button>
    <table class="table table-bordered table-hover">
      <thead class="table-dark"><tr><th>#</th><th>Нэр</th><th>Зэрэг</th><th>Хугацаа</th><th>Зураг</th><th>Үйлдэл</th></tr></thead>
      <tbody id="programsTable"></tbody>
    </table>
  </div>

  <!-- MENU TAB -->
  <div id="tab-menu" class="d-none">
    <button class="btn btn-success mb-3" onclick="openModal('menu')">+ Цэс нэмэх</button>
    <table class="table table-bordered table-hover">
      <thead class="table-dark"><tr><th>#</th><th>Нэр</th><th>Холбоос</th><th>Дараалал</th><th>Үйлдэл</th></tr></thead>
      <tbody id="menuTable"></tbody>
    </table>
  </div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="formModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Нэмэх</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Болих</button>
        <button class="btn btn-primary" onclick="saveData()">Хадгалах</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API = "http://localhost:5001";
let currentTab = "intro";
let editId = null;
let modal;

window.onload = () => {
  modal = new bootstrap.Modal(document.getElementById("formModal"));
};

// ── AUTH ──
async function doLogin() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const res = await fetch(API + "/api/login", {
    method: "POST", credentials: "include",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username, password})
  });
  if (res.ok) {
    document.getElementById("loginPage").classList.add("d-none");
    document.getElementById("adminPage").classList.remove("d-none");
    loadTable("intro");
  } else {
    document.getElementById("loginError").classList.remove("d-none");
    document.getElementById("loginError").textContent = "Буруу нэвтрэх мэдээлэл!";
  }
}

async function doLogout() {
  await fetch(API + "/api/logout", {method: "POST", credentials: "include"});
  location.reload();
}

// ── TABS ──
function showTab(e, tab) {
  e.preventDefault();
  ["intro","teachers","programs","menu"].forEach(t => {
    document.getElementById("tab-"+t).classList.add("d-none");
  });
  document.querySelectorAll(".nav-link").forEach(l => l.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.remove("d-none");
  e.target.classList.add("active");
  currentTab = tab;
  loadTable(tab);
}

// ── LOAD TABLES ──
async function loadTable(tab) {
  const map = {intro:"introduction", teachers:"teachers", programs:"programs", menu:"menu"};
  const res = await fetch(API + "/api/" + map[tab], {credentials:"include"});
  const data = await res.json();

  if (tab === "intro") {
    document.getElementById("introTable").innerHTML = data.length ? data.map(i => `
      <tr>
        <td>${i.id}</td>
        <td>${i.title}</td>
        <td>${i.content.substring(0,40)}...</td>
        <td>${i.image_url ? `<img src="${i.image_url}" style="height:40px;border-radius:4px;" onerror="this.style.display='none'"/>` : "—"}</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" onclick="editRow('intro',${i.id})">Засах</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRow('introduction',${i.id},'intro')">Устгах</button>
        </td>
      </tr>`).join("") : "<tr><td colspan='5' class='text-center text-muted'>Мэдээлэл байхгүй</td></tr>";
  }

  if (tab === "teachers") {
    document.getElementById("teachersTable").innerHTML = data.length ? data.map(t => `
      <tr>
        <td>${t.id}</td>
        <td>${t.name}</td>
        <td>${t.title}</td>
        <td>${t.department}</td>
        <td>${t.image_url ? `<img src="${t.image_url}" style="height:40px;border-radius:4px;" onerror="this.style.display='none'"/>` : "—"}</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" onclick="editRow('teachers',${t.id})">Засах</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRow('teachers',${t.id},'teachers')">Устгах</button>
        </td>
      </tr>`).join("") : "<tr><td colspan='6' class='text-center text-muted'>Мэдээлэл байхгүй</td></tr>";
  }

  if (tab === "programs") {
    document.getElementById("programsTable").innerHTML = data.length ? data.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>${p.degree}</td>
        <td>${p.duration}</td>
        <td>${p.image_url ? `<img src="${p.image_url}" style="height:40px;border-radius:4px;" onerror="this.style.display='none'"/>` : "—"}</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" onclick="editRow('programs',${p.id})">Засах</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRow('programs',${p.id},'programs')">Устгах</button>
        </td>
      </tr>`).join("") : "<tr><td colspan='6' class='text-center text-muted'>Мэдээлэл байхгүй</td></tr>";
  }

  if (tab === "menu") {
    document.getElementById("menuTable").innerHTML = data.length ? data.map(m => `
      <tr>
        <td>${m.id}</td>
        <td>${m.label}</td>
        <td>${m.link}</td>
        <td>${m.order_num}</td>
        <td>
          <button class="btn btn-sm btn-warning me-1" onclick="editRow('menu',${m.id})">Засах</button>
          <button class="btn btn-sm btn-danger" onclick="deleteRow('menu',${m.id},'menu')">Устгах</button>
        </td>
      </tr>`).join("") : "<tr><td colspan='5' class='text-center text-muted'>Мэдээлэл байхгүй</td></tr>";
  }
}

// ── MODAL FORMS ──
function openModal(tab, data=null) {
  editId = data ? data.id : null;
  document.getElementById("modalTitle").textContent = data ? "Засах" : "Нэмэх";

  if (tab === "intro") {
    document.getElementById("modalBody").innerHTML = `
      <input type="text" id="f_title" class="form-control mb-2" placeholder="Гарчиг" value="${data?.title||''}"/>
      <textarea id="f_content" class="form-control mb-2" rows="4" placeholder="Агуулга">${data?.content||''}</textarea>
      <input type="text" id="f_image" class="form-control mb-2" placeholder="Зургийн URL (заавал биш)" value="${data?.image_url||''}"/>
      ${data?.image_url ? `<img src="${data.image_url}" class="img-fluid rounded mt-1" style="max-height:120px;" onerror="this.style.display='none'"/>` : ""}`;
  }

  if (tab === "teachers") {
    document.getElementById("modalBody").innerHTML = `
      <input type="text" id="f_name" class="form-control mb-2" placeholder="Нэр" value="${data?.name||''}"/>
      <input type="text" id="f_title" class="form-control mb-2" placeholder="Цол" value="${data?.title||''}"/>
      <input type="text" id="f_dept" class="form-control mb-2" placeholder="Тэнхим" value="${data?.department||''}"/>
      <input type="email" id="f_email" class="form-control mb-2" placeholder="Имэйл" value="${data?.email||''}"/>
      <input type="text" id="f_image" class="form-control mb-2" placeholder="Зургийн URL (заавал биш)" value="${data?.image_url||''}"/>
      ${data?.image_url ? `<img src="${data.image_url}" class="img-fluid rounded mt-1" style="max-height:120px;" onerror="this.style.display='none'"/>` : ""}`;
  }

  if (tab === "programs") {
    document.getElementById("modalBody").innerHTML = `
      <input type="text" id="f_name" class="form-control mb-2" placeholder="Хөтөлбөрийн нэр" value="${data?.name||''}"/>
      <input type="text" id="f_degree" class="form-control mb-2" placeholder="Зэрэг (Бакалавр...)" value="${data?.degree||''}"/>
      <input type="text" id="f_duration" class="form-control mb-2" placeholder="Хугацаа (4 жил...)" value="${data?.duration||''}"/>
      <textarea id="f_desc" class="form-control mb-2" rows="3" placeholder="Тайлбар">${data?.description||''}</textarea>
      <input type="text" id="f_image" class="form-control mb-2" placeholder="Зургийн URL (заавал биш)" value="${data?.image_url||''}"/>
      ${data?.image_url ? `<img src="${data.image_url}" class="img-fluid rounded mt-1" style="max-height:120px;" onerror="this.style.display='none'"/>` : ""}`;
  }

  if (tab === "menu") {
    document.getElementById("modalBody").innerHTML = `
      <input type="text" id="f_label" class="form-control mb-2" placeholder="Цэсний нэр" value="${data?.label||''}"/>
      <input type="text" id="f_link" class="form-control mb-2" placeholder="Холбоос (#intro эсвэл https://...)" value="${data?.link||''}"/>
      <input type="number" id="f_order" class="form-control" placeholder="Дараалал (1, 2, 3...)" value="${data?.order_num||0}"/>`;
  }

  modal.show();
}

async function editRow(tab, id) {
  const map = {intro:"introduction", teachers:"teachers", programs:"programs", menu:"menu"};
  const res = await fetch(API + "/api/" + map[tab], {credentials:"include"});
  const data = await res.json();
  const row = data.find(r => r.id === id);
  openModal(tab, row);
}

// ── SAVE ──
async function saveData() {
  const map = {intro:"introduction", teachers:"teachers", programs:"programs", menu:"menu"};
  const endpoint = API + "/api/" + map[currentTab] + (editId ? "/"+editId : "");
  const method = editId ? "PUT" : "POST";
  let body = {};

  if (currentTab === "intro") {
    body = {
      title: document.getElementById("f_title").value,
      content: document.getElementById("f_content").value,
      image_url: document.getElementById("f_image").value
    };
  }
  if (currentTab === "teachers") {
    body = {
      name: document.getElementById("f_name").value,
      title: document.getElementById("f_title").value,
      department: document.getElementById("f_dept").value,
      email: document.getElementById("f_email").value,
      image_url: document.getElementById("f_image").value
    };
  }
  if (currentTab === "programs") {
    body = {
      name: document.getElementById("f_name").value,
      degree: document.getElementById("f_degree").value,
      duration: document.getElementById("f_duration").value,
      description: document.getElementById("f_desc").value,
      image_url: document.getElementById("f_image").value
    };
  }
  if (currentTab === "menu") {
    body = {
      label: document.getElementById("f_label").value,
      link: document.getElementById("f_link").value,
      order_num: parseInt(document.getElementById("f_order").value) || 0
    };
  }

  await fetch(endpoint, {
    method, credentials:"include",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });

  modal.hide();
  loadTable(currentTab);
}

// ── DELETE ──
async function deleteRow(endpoint, id, tab) {
  if (!confirm("Устгахдаа итгэлтэй байна уу?")) return;
  await fetch(API + "/api/" + endpoint + "/" + id, {
    method: "DELETE", credentials: "include"
  });
  loadTable(tab);
}
</script>
</body>
</html>
